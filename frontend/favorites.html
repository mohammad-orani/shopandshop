<!DOCTYPE html>
<html lang="ar">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Favorites - {{BRAND_NAME}}</title>
    <meta name="description" content="Your saved favorite products at {{BRAND_NAME}}.">
    <meta name="robots" content="noindex, follow">
    <link rel="canonical" href="{{SITE_URL}}/favorites.html">
    <meta property="og:title" content="Favorites - {{BRAND_NAME}}">
    <meta property="og:type" content="website">

    <link rel="stylesheet" href="dist/css/topbaic-style.min.css">
    <link rel="stylesheet" href="dist/css/mobile-nav-fix.min.css">
    <link rel="stylesheet" href="dist/css/styles.min.css">
    <link rel="stylesheet" href="dist/css/search-bar.min.css">
    <link rel="stylesheet" href="dist/css/design-system.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://primejo-ecommerce-backend-demo.up.railway.app">
    <link rel="preconnect" href="https://primejo.store">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap"></noscript>
    <style>
        .favorites-page-wrapper {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 20px 60px;
        }

        .favorites-header {
            display: flex;
            align-items: center;
            gap: 15px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--primary-black);
            margin-bottom: 30px;
        }

        .favorites-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            font-weight: 900;
            color: var(--primary-black);
        }

        .favorites-count-badge {
            background: var(--primary-black);
            color: white;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 700;
        }

        /* Use same grid as products page */
        #favoritesGrid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 25px;
        }

        @media (max-width: 1200px) {
            #favoritesGrid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 900px) {
            #favoritesGrid {
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
            }
        }

        @media (max-width: 480px) {
            #favoritesGrid {
                gap: 10px;
            }
        }

        /* Empty State */
        .favorites-empty {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px 20px;
        }

        .favorites-empty-icon {
            font-size: 5rem;
            display: block;
            margin-bottom: 20px;
            opacity: 0.25;
        }

        .favorites-empty h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 900;
            margin-bottom: 12px;
        }

        .favorites-empty p {
            font-size: 1rem;
            color: #888;
            margin-bottom: 30px;
        }

        .btn-browse {
            display: inline-block;
            padding: 14px 35px;
            background: var(--primary-black);
            color: white;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .btn-browse:hover {
            background: #333;
            transform: translateY(-2px);
        }
    </style>
</head>

<body>
    <div id="site-header"></div>

    <div class="favorites-page-wrapper">
        <div class="favorites-header">
            <h1 data-en="My Favorites" data-ar="المفضلة">My Favorites</h1>
            <span class="favorites-count-badge" id="favoritesCountBadge">0 items</span>
        </div>

        <div id="favoritesGrid">
            <p style="padding:40px;text-align:center;color:#999;">Loading...</p>
        </div>
    </div>


    <div id="site-footer"></div>

    <!-- Scripts -->
    <script src="dist/js/config.min.js" defer></script>
    <script src="dist/js/header.min.js" defer></script>
    <script src="dist/js/footer.min.js" defer></script>
    <script src="dist/js/api.min.js" defer></script>
    <script src="dist/js/app.min.js" defer></script>
    <script src="dist/js/settings.min.js" defer></script>
    <script src="dist/js/topbaic-products.min.js" defer></script>
    <script src="dist/js/general-info.min.js" defer></script>

    <script>
        async function loadFavorites() {
            const grid = document.getElementById('favoritesGrid');
            const countBadge = document.getElementById('favoritesCountBadge');
            if (!grid) return;

            grid.innerHTML = '<p style="padding:40px;text-align:center;color:#999;">Loading...</p>';

            const favoriteIds = getFavorites();

            // Update count badge
            if (countBadge) {
                countBadge.textContent = currentLanguage === 'ar'
                    ? `${favoriteIds.length} منتج`
                    : `${favoriteIds.length} item${favoriteIds.length !== 1 ? 's' : ''}`;
            }

            if (favoriteIds.length === 0) {
                grid.innerHTML = `
                    <div class="favorites-empty">
                        <span class="favorites-empty-icon">♥</span>
                        <h2 data-en="No Favorites Yet" data-ar="لا توجد مفضلة بعد">No Favorites Yet</h2>
                        <p data-en="Add products to your favorites to see them here"
                           data-ar="أضف منتجات إلى مفضلتك لتظهر هنا">
                            Add products to your favorites to see them here
                        </p>
                        <a href="index.html" class="btn-browse"
                           data-en="Continue Shopping" data-ar="متابعة التسوق">
                            Continue Shopping
                        </a>
                    </div>`;
                if (typeof switchLanguage === 'function') switchLanguage(currentLanguage);
                return;
            }

            try {
                const allProducts = await getProducts();
                const favProducts = allProducts.filter(p =>
                    favoriteIds.some(fid => String(fid) === String(p.id))
                );

                if (favProducts.length === 0) {
                    // IDs saved but products deleted from DB
                    saveFavorites([]);
                    grid.innerHTML = `
                        <div class="favorites-empty">
                            <span class="favorites-empty-icon">♥</span>
                            <h2 data-en="No Favorites Found" data-ar="لم يتم العثور على مفضلة">No Favorites Found</h2>
                            <a href="index.html" class="btn-browse"
                               data-en="Browse Products" data-ar="تصفح المنتجات">Browse Products</a>
                        </div>`;
                    if (typeof switchLanguage === 'function') switchLanguage(currentLanguage);
                    return;
                }

                // ✅ Use same rich card as rest of site
                grid.innerHTML = favProducts.map(p => createTopBaicProductCard(p)).join('');

                // Update count with actual matched count
                if (countBadge) {
                    countBadge.textContent = currentLanguage === 'ar'
                        ? `${favProducts.length} منتج`
                        : `${favProducts.length} item${favProducts.length !== 1 ? 's' : ''}`;
                }

                if (typeof switchLanguage === 'function') switchLanguage(currentLanguage);

            } catch (err) {
                console.error('loadFavorites error:', err);
                grid.innerHTML = '<p style="text-align:center;padding:3rem;color:#e74c3c;">Failed to load favorites.</p>';
            }
        }

        // Run after DOM ready
        document.addEventListener('DOMContentLoaded', loadFavorites);
    </script>
</body>

</html>
