<!DOCTYPE html>
<html lang="ar">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - {{BRAND_NAME}}</title>
    <meta name="description" content="Shop quality products at {{BRAND_NAME}} with secure checkout and fast delivery.">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="{{SITE_URL}}/product.html">

    <!-- Open Graph — overwritten with real product data by product.js once loaded -->
    <meta property="og:type" content="product">
    <meta property="og:site_name" content="{{BRAND_NAME}}">
    <meta property="og:title" content="Product Details - {{BRAND_NAME}}">
    <meta property="og:description" content="Shop quality products at {{BRAND_NAME}} with secure checkout and fast delivery.">
    <meta property="og:url" content="{{SITE_URL}}/product.html">
    <meta property="og:image" content="{{SITE_URL}}/assets/brand/logo.svg">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Product Details - {{BRAND_NAME}}">
    <meta name="twitter:description" content="Shop quality products at {{BRAND_NAME}} with secure checkout and fast delivery.">
    <meta name="twitter:image" content="{{SITE_URL}}/assets/brand/logo.svg">

    <link rel="stylesheet" href="dist/css/topbaic-style.min.css">
    <link rel="stylesheet" href="dist/css/mobile-nav-fix.min.css">
    <link rel="stylesheet" href="dist/css/product.min.css">
    <link rel="stylesheet" href="dist/css/search-bar.min.css">
    <link rel="stylesheet" href="dist/css/design-system.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://shopandshop-production.up.railway.app">
    <link rel="preconnect" href="https://shopandshop.online">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap"></noscript>
</head>

<body>

    <!-- TOP BAIC Style Header -->
    <!-- TOP BAIC Style Header - Include on all pages -->
    <!-- TOP BAIC Style Header - Include on all pages -->
    <div id="site-header"></div>



    <div class="container product-container">
        <div class="product-detail" id="productDetail">
            <!-- Product details will be loaded here -->
        </div>
    </div>


    <div id="site-footer"></div>

    <!-- Structured data: Product + Breadcrumb — populated with real data by
         product.js once the product loads; empty/absent until then. -->
    <script type="application/ld+json" id="productSchema"></script>
    <script type="application/ld+json" id="breadcrumbSchema"></script>

    <!-- Scripts -->
    <script src="dist/js/config.min.js" defer></script>
    <script src="dist/js/header.min.js" defer></script>
    <script src="dist/js/footer.min.js" defer></script>
    <!-- <script src="mobile-menu.js" defer></script> -->
    <script src="dist/js/api.min.js" defer></script>
    <script src="dist/js/app.min.js" defer></script>
    <script src="dist/js/settings.min.js" defer></script>
    <!-- Reused by product.js for the Related Products section (same card
         renderer as the homepage/category grids). Its own auto-init is a
         no-op here since #topbaicProductsGrid doesn't exist on this page. -->
    <script src="dist/js/topbaic-products.min.js" defer></script>
    <script src="dist/js/product.min.js" defer></script>
    <script src="dist/js/modern-animations.min.js" defer></script>
    <script src="dist/js/search-handler.min.js" defer></script>
    <!-- Add this script at the end of body -->
    <script src="dist/js/general-info.min.js" defer></script>
</body>

</html>
