<!DOCTYPE html>
<html lang="ar">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - {{BRAND_NAME}}</title>
    <meta name="description" content="Review your cart at {{BRAND_NAME}} before checkout.">
    <meta name="robots" content="noindex, follow">
    <link rel="canonical" href="{{SITE_URL}}/cart.html">
    <meta property="og:title" content="Shopping Cart - {{BRAND_NAME}}">
    <meta property="og:type" content="website">
    <link rel="stylesheet" href="dist/css/topbaic-style.min.css">
    <link rel="stylesheet" href="dist/css/mobile-nav-fix.min.css">
    <link rel="stylesheet" href="dist/css/styles.min.css">
    <link rel="stylesheet" href="dist/css/cart.min.css">
    <link rel="stylesheet" href="dist/css/search-bar.min.css">
    <link rel="stylesheet" href="dist/css/design-system.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://shopandshop-production.up.railway.app">
    <link rel="preconnect" href="https://shopandshop.online">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap"></noscript>
</head>

<body>
    <!-- TOP BAIC Style Header - Include on all pages -->
    <div id="site-header"></div>


    <div class="container">
        <h1 class="page-title" data-en="Shopping Cart" data-ar="سلة التسوق">Shopping Cart</h1>

        <div id="freeShippingBanner" style="display:none;"></div>

        <div class="cart-layout">
            <div class="cart-items" id="cartItems">
                <!-- Cart items will be loaded here -->
            </div>

            <div class="empty-cart-message" id="emptyCart" style="display:none;">
                <div class="empty-cart-icon" aria-hidden="true">🛒</div>
                <h2 data-en="Your cart is empty" data-ar="سلتك فارغة">Your cart is empty</h2>
                <p data-en="Looks like you haven't added anything yet." data-ar="يبدو أنك لم تضف أي شيء بعد.">
                    Looks like you haven't added anything yet.</p>
                <a href="index.html" class="empty-cart-cta" data-en="Start Shopping" data-ar="ابدأ التسوق">Start Shopping</a>
            </div>

            <div class="cart-summary">
                <h2 data-en="Order Summary" data-ar="ملخص الطلب">Order Summary</h2>
                <div class="summary-row">
                    <span data-en="Subtotal" data-ar="المجموع الفرعي">Subtotal</span>
                    <span id="subtotal">JOD 0</span>
                </div>
                <div class="summary-row savings-row" id="cartSavedRow" style="display:none;">
                    <span data-en="You saved" data-ar="وفرت">You saved</span>
                    <span class="savings-amount">0.00 JOD</span>
                </div>
                <div class="summary-row total">
                    <span data-en="Total" data-ar="الإجمالي">Total</span>
                    <span id="total">JOD 0</span>
                </div>
                <button class="checkout-btn" onclick="proceedToCheckout()" data-en="Proceed to Checkout"
                    data-ar="إتمام الطلب">Proceed to Checkout</button>
                <button class="continue-shopping" onclick="window.location.href='index.html'"
                    data-en="Continue Shopping" data-ar="متابعة التسوق">Continue Shopping</button>
            </div>
        </div>
    </div>
    <!-- Filter Bar -->
    <div class="filter-bar">
        <div class="filter-content">
            <div class="filter-left">
                <button class="filter-btn" onclick="CartPage.filterProducts('topseller', this)" data-en="Top Sellers"
                    data-ar="الأكثر مبيعاً">
                    Top Sellers
                </button>
            </div>
        </div>
    </div>

    <!-- Products Grid -->
    <section class="topbaic-products">
        <div class="products-grid" id="topbaicTopSellerProductsGrid">
            <!-- Products will be loaded here by JavaScript -->
        </div>
    </section>


    <div id="site-footer"></div>

    <!-- Scripts -->
    <script src="dist/js/config.min.js" defer></script>
    <script src="dist/js/header.min.js" defer></script>
    <script src="dist/js/footer.min.js" defer></script>
    <!-- <script src="mobile-menu.js" defer></script> -->
    <script src="dist/js/api.min.js" defer></script>
    <script src="dist/js/app.min.js" defer></script>
    <script src="dist/js/topbaic-products.min.js" defer></script>
    <script src="dist/js/settings.min.js" defer></script>
    <script src="dist/js/cart-page.min.js" defer></script>
    <script src="dist/js/modern-animations.min.js" defer></script>

    <!-- Add this script at the end of body -->
    <script src="dist/js/general-info.min.js" defer></script>
</body>

</html>
