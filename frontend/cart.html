<!DOCTYPE html>
<html lang="ar">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - Primejo</title>
    <link rel="stylesheet" href="topbaic-style.css">
    <link rel="stylesheet" href="mobile-nav-fix.css">
    <!-- <link rel="stylesheet" href="modern-animations.css"> -->
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="cart.css">
    <link rel="stylesheet" href="search-bar.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Work+Sans:wght@400;600&display=swap" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Work+Sans:wght@400;600&display=swap"></noscript>
</head>

<body>
    <!-- TOP BAIC Style Header - Include on all pages -->
    <div id="site-header"></div>


    <div class="container">
        <h1 class="page-title" data-en="Shopping Cart" data-ar="سلة التسوق">Shopping Cart</h1>

        <div id="freeShippingBanner" style="display:none;"></div>

        <div class="cart-layout">
            <div class="cart-items" id="cartItems">
                <!-- Cart items will be loaded here -->
            </div>

            <div class="cart-summary">
                <h2 data-en="Order Summary" data-ar="ملخص الطلب">Order Summary</h2>
                <div class="summary-row">
                    <span data-en="Subtotal" data-ar="المجموع الفرعي">Subtotal</span>
                    <span id="subtotal">JOD 0</span>
                </div>
                <div class="summary-row savings-row" id="cartSavedRow" style="display:none;">
                    <span data-en="You saved" data-ar="وفرت">You saved</span>
                    <span class="savings-amount">0.00 JOD</span>
                </div>
                <div class="summary-row total">
                    <span data-en="Total" data-ar="الإجمالي">Total</span>
                    <span id="total">JOD 0</span>
                </div>
                <button class="checkout-btn" onclick="proceedToCheckout()" data-en="Proceed to Checkout"
                    data-ar="إتمام الطلب">Proceed to Checkout</button>
                <button class="continue-shopping" onclick="window.location.href='index.html'"
                    data-en="Continue Shopping" data-ar="متابعة التسوق">Continue Shopping</button>
            </div>
        </div>
    </div>
    <!-- Filter Bar -->
    <div class="filter-bar">
        <div class="filter-content">
            <div class="filter-left">
                <button class="filter-btn" onclick="filterProducts('topseller', this)" data-en="Top Sellers"
                    data-ar="الأكثر مبيعاً">
                    Top Sellers
                </button>
            </div>
        </div>
    </div>

    <!-- Products Grid -->
    <section class="topbaic-products">
        <div class="products-grid" id="topbaicTopSellerProductsGrid">
            <!-- Products will be loaded here by JavaScript -->
        </div>
    </section>


    <div id="site-footer"></div>

    <!-- Scripts -->
    <script src="header.js" defer></script>
    <script src="footer.js" defer></script>
    <!-- <script src="mobile-menu.js" defer></script> -->
    <script src="config.js" defer></script>
    <script src="api.js" defer></script>
    <script src="app.js" defer></script>
    <script src="topbaic-products.js" defer></script>
    <script src="settings.js" defer></script>
    <script src="cart-page.js" defer></script>
    <script src="modern-animations.js" defer></script>

    <!-- Add this script at the end of body -->
    <script src="general-info.js" defer></script>
</body>

</html>
