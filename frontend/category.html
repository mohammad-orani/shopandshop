<!DOCTYPE html>
<html lang="ar">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categories - {{BRAND_NAME}}</title>
    <meta name="description" content="Browse all product categories at {{BRAND_NAME}} and find exactly what you need.">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="{{SITE_URL}}/category.html">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="{{BRAND_NAME}}">
    <meta property="og:title" content="Categories - {{BRAND_NAME}}">
    <meta property="og:description" content="Browse all product categories at {{BRAND_NAME}} and find exactly what you need.">
    <meta property="og:url" content="{{SITE_URL}}/category.html">
    <meta property="og:image" content="{{SITE_URL}}/assets/brand/icon.svg">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Categories - {{BRAND_NAME}}">
    <meta name="twitter:description" content="Browse all product categories at {{BRAND_NAME}} and find exactly what you need.">
    <meta name="twitter:image" content="{{SITE_URL}}/assets/brand/icon.svg">

    <link rel="stylesheet" href="dist/css/topbaic-style.min.css">
    <link rel="stylesheet" href="dist/css/mobile-nav-fix.min.css">
    <link rel="stylesheet" href="dist/css/search-bar.min.css">
    <link rel="stylesheet" href="dist/css/design-system.min.css">
    <link rel="stylesheet" href="dist/css/shop.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://shopandshop-production.up.railway.app">
    <link rel="preconnect" href="https://shopandshop.online">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap"></noscript>
</head>

<body>
    <!-- TOP BAIC Style Header -->
    <div id="site-header"></div>

    <!-- Breadcrumb -->
    <div class="topbaic-breadcrumb">
        <div class="breadcrumb-content">
            <a href="index.html" data-en="Home" data-ar="الرئيسية">Home</a>
            <span class="breadcrumb-separator">›</span>
            <span id="breadcrumbCategory" data-en="Categories" data-ar="الفئات">Categories</span>
        </div>
    </div>

    <!-- Category Banners (Show when no specific category selected) -->
    <div id="categoryBannersSection" class="category-banners">
        <div class="collection-header scroll-reveal">
            <h1 class="collection-title" data-en="Shop by Category" data-ar="تسوق حسب الفئة">Shop by Category</h1>
            <p class="collection-description"
                data-en="Browse our curated houseware collection organized by category — find exactly what your home needs."
                data-ar="تصفح مجموعتنا المنزلية المنتقاة بعناية حسب الفئة — اعثر على ما يحتاجه منزلك بالضبط.">
                Browse our curated houseware collection organized by category — find exactly what your home needs.
            </p>
        </div>

        <div class="banners-grid" id="categoryBannersGrid">
            <!-- Category banners will be loaded here dynamically -->
        </div>
    </div>

    <!-- Single Category View (Show when specific category selected) -->
    <div id="categoryProductsSection" style="display: none;">
        <div class="category-header-single">
            <a href="category.html" class="category-back-btn">
                <span>←</span>
                <span data-en="Back to Categories" data-ar="العودة للفئات">Back to Categories</span>
            </a>
            <h1 class="collection-title" id="categoryTitle">Category</h1>
            <p class="collection-description" id="categoryDescription"></p>
            <p class="collection-count" id="categoryCount"></p>
        </div>

        <!-- Filter Bar -->
        <div class="filter-bar">
            <div class="filter-content">
                <div class="filter-left">
                    <button class="filter-btn active" onclick="filterCategoryProducts('all')" data-en="All"
                        data-ar="الكل">All</button>
                    <button class="filter-btn" onclick="filterCategoryProducts('new')" data-en="New"
                        data-ar="جديد">New</button>
                    <button class="filter-btn" onclick="filterCategoryProducts('topseller')" data-en="Top Sellers"
                        data-ar="الأكثر مبيعاً">Top Sellers</button>
                </div>

                <div class="filter-right">
                    <select class="sort-select" onchange="sortCategoryProducts(this.value)">
                        <option value="featured" data-en="Featured" data-ar="مميز">Featured</option>
                        <option value="price-low" data-en="Price: Low to High" data-ar="السعر: من الأقل للأعلى">Price:
                            Low to High</option>
                        <option value="price-high" data-en="Price: High to Low" data-ar="السعر: من الأعلى للأقل">Price:
                            High to Low</option>
                        <option value="name" data-en="Name: A-Z" data-ar="الاسم: أ-ي">Name: A-Z</option>
                    </select>
                </div>
            </div>
        </div>
    </div>
    <!-- Products Grid -->
    <section class="topbaic-products">
        <div class="products-grid" id="topbaicProductsGrid">
            <!-- Products will be loaded here by JavaScript -->
        </div>
    </section>

   
    <div id="site-footer"></div>

    <!-- Structured data: Breadcrumb — rewritten by category-page.js when a
         specific category (?cat=) is loaded, so it always matches the view. -->
    <script type="application/ld+json" id="breadcrumbSchema">
    {
        "@context": "https://schema.org",
        "@type": "BreadcrumbList",
        "itemListElement": [
            { "@type": "ListItem", "position": 1, "name": "Home", "item": "{{SITE_URL}}/index.html" },
            { "@type": "ListItem", "position": 2, "name": "Categories", "item": "{{SITE_URL}}/category.html" }
        ]
    }
    </script>

    <!-- Scripts -->
    <script src="dist/js/config.min.js" defer></script>
    <script src="dist/js/header.min.js" defer></script>
    <script src="dist/js/footer.min.js" defer></script>
    <!-- <script src="mobile-menu.js" defer></script> -->
    <script src="dist/js/api.min.js" defer></script>
    <script src="dist/js/app.min.js" defer></script>
    <script src="dist/js/settings.min.js" defer></script>
    <script src="dist/js/topbaic-products.min.js" defer></script>
    <script src="dist/js/category-page.min.js" defer></script>
    <script src="dist/js/modern-animations.min.js" defer></script>
    <!-- Add this script at the end of body -->
    <script src="dist/js/general-info.min.js" defer></script>
</body>

</html>
