<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-en="Search Results - {{BRAND_NAME}}" data-ar="نتائج البحث - {{BRAND_NAME}}">Search Results - {{BRAND_NAME}}</title>
    <meta name="description" content="Search {{BRAND_NAME}}'s full product catalog to find exactly what you're looking for.">
    <!-- This page only ever renders a query-dependent search-results view (see
         initSearchPage() below) — never a stable "browse all" listing — so it's
         excluded from the index; the individual product/category pages it
         links to carry the real indexable content. -->
    <meta name="robots" content="noindex, follow">
    <link rel="canonical" href="{{SITE_URL}}/products.html">
    <link rel="stylesheet" href="dist/css/topbaic-style.min.css">
    <link rel="stylesheet" href="dist/css/mobile-nav-fix.min.css">
    <link rel="stylesheet" href="dist/css/search-bar.min.css">
    <link rel="stylesheet" href="dist/css/design-system.min.css">
    <link rel="stylesheet" href="dist/css/shop.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://shopandshop-production.up.railway.app">
    <link rel="preconnect" href="https://shopandshop.online">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap"></noscript>
</head>

<body>
    <div id="site-header"></div>

    <!-- Breadcrumb -->
    <div class="topbaic-breadcrumb">
        <div class="breadcrumb-content">
            <a href="index.html" data-en="Home" data-ar="الرئيسية">Home</a>
            <span class="breadcrumb-separator">›</span>
            <span data-en="Search Results" data-ar="نتائج البحث">Search Results</span>
        </div>
    </div>

    <!-- Results Header -->
    <div class="search-results-header">
        <h1>
            <span data-en="Results for" data-ar="نتائج البحث عن">Results for</span>
            <span class="search-query-highlight" id="searchQueryLabel"></span>
        </h1>
        <p class="search-results-count" id="productCount"></p>
    </div>

    <!-- Filter Bar -->
    <div class="filter-bar">
        <div class="filter-content">
            <div class="filter-left">
                <button class="filter-btn active" onclick="applyFilter('all', this)"
                    data-en="All" data-ar="الكل">All</button>
                <button class="filter-btn" onclick="applyFilter('topseller', this)"
                    data-en="Top Sellers" data-ar="الأكثر مبيعاً">Top Sellers</button>
                <button class="filter-btn" onclick="applyFilter('offer', this)"
                    data-en="Offers" data-ar="العروض">Offers</button>
            </div>
            <div class="filter-right">
                <select class="sort-select" onchange="applySort(this.value)">
                    <option value="featured" data-en="Featured" data-ar="مميز">Featured</option>
                    <option value="price-low" data-en="Price: Low to High" data-ar="السعر: من الأقل للأعلى">Price: Low to High</option>
                    <option value="price-high" data-en="Price: High to Low" data-ar="السعر: من الأعلى للأقل">Price: High to Low</option>
                    <option value="name" data-en="Name: A-Z" data-ar="الاسم: أ-ي">Name: A-Z</option>
                </select>
            </div>
        </div>
    </div>

    <!-- Products Grid -->
    <section class="topbaic-products">
        <div class="products-grid" id="topbaicProductsGrid">
            <p style="text-align:center;padding:3rem;color:var(--color-text-light);">Loading...</p>
        </div>
    </section>

    <div id="site-footer"></div>

    <!-- Scripts -->
    <script src="dist/js/config.min.js" defer></script>
    <script src="dist/js/header.min.js" defer></script>
    <script src="dist/js/footer.min.js" defer></script>
    <script src="dist/js/api.min.js" defer></script>
    <script src="dist/js/app.min.js" defer></script>
    <script src="dist/js/settings.min.js" defer></script>
    <script src="dist/js/topbaic-products.min.js" defer></script>
    <script src="dist/js/modern-animations.min.js" defer></script>
    <script src="dist/js/general-info.min.js" defer></script>
    <script>
        // ==================== SEARCH RESULTS PAGE ====================

        let allMatchedProducts = [];
        let searchResultsFilter = 'all';
        let currentSort = 'featured';

        async function initSearchPage() {
            const params = new URLSearchParams(window.location.search);
            const query = params.get('search') || '';

            // Show the query in the heading
            const labelEl = document.getElementById('searchQueryLabel');
            if (labelEl) labelEl.textContent = query ? `"${query}"` : '';

            // Pre-fill the header search input if present
            const searchInput = document.getElementById('primejoSearchInput');
            if (searchInput && query) searchInput.value = query;

            const grid = document.getElementById('topbaicProductsGrid');

            if (!query.trim()) {
                grid.innerHTML = `
                    <div class="search-no-results">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
                        </svg>
                        <h2 data-en="No search term entered" data-ar="لم يتم إدخال كلمة بحث">No search term entered</h2>
                        <a href="index.html" data-en="Back to Home" data-ar="العودة للرئيسية">Back to Home</a>
                    </div>`;
                return;
            }

            // Fetch all products and filter client-side
            const allProducts = await getProducts();
            const q = query.toLowerCase();
            allMatchedProducts = allProducts.filter(p =>
                (p.name_en || '').toLowerCase().includes(q) ||
                (p.name_ar || '').toLowerCase().includes(q) ||
                (p.description_en || '').toLowerCase().includes(q)
            );

            renderResults();
        }

        function renderResults() {
            const grid = document.getElementById('topbaicProductsGrid');
            const lang = (typeof currentLanguage !== 'undefined' ? currentLanguage : 'en');

            let filtered = allMatchedProducts;
            if (searchResultsFilter === 'topseller') filtered = allMatchedProducts.filter(p => p.topSeller || p.is_top_seller);
            if (searchResultsFilter === 'offer') filtered = allMatchedProducts.filter(p => p.isOffer || p.is_offer);

            filtered = [...filtered];
            switch (currentSort) {
                case 'price-low':  filtered.sort((a, b) => (a.new_price || a.newPrice || 0) - (b.new_price || b.newPrice || 0)); break;
                case 'price-high': filtered.sort((a, b) => (b.new_price || b.newPrice || 0) - (a.new_price || a.newPrice || 0)); break;
                case 'name':       filtered.sort((a, b) => (a.name_en || '').localeCompare(b.name_en || '')); break;
            }

            const countEl = document.getElementById('productCount');
            if (countEl) {
                countEl.setAttribute('data-en', `${filtered.length} product(s) found`);
                countEl.setAttribute('data-ar', `تم العثور على ${filtered.length} منتج`);
                countEl.textContent = lang === 'ar' ? `تم العثور على ${filtered.length} منتج` : `${filtered.length} product(s) found`;
            }

            if (filtered.length === 0) {
                grid.innerHTML = `
                    <div class="search-no-results">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
                        </svg>
                        <h2 data-en="No products found" data-ar="لا توجد منتجات">No products found</h2>
                        <a href="index.html" data-en="Back to Home" data-ar="العودة للرئيسية">Back to Home</a>
                    </div>`;
            } else {
                grid.innerHTML = filtered.map(p => createTopBaicProductCard(p)).join('');
            }

            if (typeof switchLanguage === 'function') switchLanguage(lang);
        }

        function applyFilter(filter, btn) {
            searchResultsFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            if (btn) btn.classList.add('active');
            renderResults();
        }

        function applySort(sortBy) {
            currentSort = sortBy;
            renderResults();
        }

        // Initialize on load
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initSearchPage);
        } else {
            initSearchPage();
        }
    </script>
</body>

</html>
