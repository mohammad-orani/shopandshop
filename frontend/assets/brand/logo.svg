    <!-- Loop 2 (Dark Green Interlock) -->
    <path d="M120 40 C 150 40, 150 110, 120 110 C 90 110, 60 40, 30 40 C 0 40, 0 110, 30 110" stroke="#166534" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
